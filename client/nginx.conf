cat > ~/Desktop/cryptopulse/client/nginx.conf << 'EOF'
server {
  listen 80;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /hub/ {
    proxy_pass https://cryptopulse-backend-orn1.onrender.com;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host cryptopulse-backend-orn1.onrender.com;
    proxy_ssl_server_name on;
  }

  location /api/ {
    proxy_pass https://cryptopulse-backend-orn1.onrender.com;
    proxy_set_header Host cryptopulse-backend-orn1.onrender.com;
    proxy_ssl_server_name on;
  }
}
EOF